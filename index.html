<title>Sistema Loja de Açaí</title>

}

h1{

}

.card{
  background:white;
  border:2px solid #c4b5fd;
  border-radius:10px;
  padding:15px;
  margin-top:20px;
}

input{

}

button{
  background:#6d28d9;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#5b21b6;
}

.delete{
  background:#ef4444;
}

.delete:hover{
  background:#dc2626;
}

.lista-item{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  padding:6px;
  background:#fafafa;
  border-radius:6px;
}

.estoque-item{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}
</style>

<div class="card">

<input id="cliente" placeholder="Nome do cliente">
<input id="valor" type="number" placeholder="Valor">
<button onclick="adicionarPedido()">Adicionar</button>
</div>

<div class="card">

<p>Total vendido: R$ <span id="totalVendas">0</span></p>

<div class="card">

  const cliente = document.getElementById("cliente").value;

  document.getElementById("valor").value="";

  atualizarPedidos();
}
